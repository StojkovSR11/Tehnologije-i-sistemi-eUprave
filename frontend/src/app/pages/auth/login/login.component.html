<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <h1>Prijava</h1>
      <p>Prijavite se na eGovernment portal</p>
    </div>

    <div *ngIf="errorMessage" class="error-message">
      {{ errorMessage }}
    </div>

    <form (ngSubmit)="onLogin()" #loginForm="ngForm" class="auth-form">
      <div class="form-group">
        <label for="jmbg">JMBG</label>
        <input 
          type="text" 
          id="jmbg" 
          [(ngModel)]="jmbg" 
          name="jmbg" 
          required 
          class="form-control"
          placeholder="Unesite vaš JMBG">
      </div>

      <div class="form-group">
        <label for="password">Lozinka</label>
        <input 
          type="password" 
          id="password" 
          [(ngModel)]="password" 
          name="password" 
          required 
          class="form-control"
          placeholder="Unesite vašu lozinku">
      </div>

      <button type="submit" class="btn-primary" [disabled]="!loginForm.form.valid">
        Prijavi se
      </button>
    </form>

    <div class="auth-footer">
      <p>Nemate nalog?</p>
      <a routerLink="/register">Registrujte se ovde</a>
    </div>
  </div>
</div>
