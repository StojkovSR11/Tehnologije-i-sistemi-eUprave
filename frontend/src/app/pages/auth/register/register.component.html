<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <h1>Registracija</h1>
      <p>Kreirajte nalog za pristup eGovernment portalu</p>
    </div>

    <div *ngIf="message && message.includes('Uspešno')" class="success-message">
      {{ message }}
    </div>

    <div *ngIf="message && !message.includes('Uspešno')" class="error-message">
      {{ message }}
    </div>

    <form (ngSubmit)="onRegister()" #registerForm="ngForm" class="auth-form">
      <div class="form-group">
        <label for="jmbg">JMBG</label>
        <input 
          type="text" 
          id="jmbg" 
          [(ngModel)]="jmbg" 
          name="jmbg" 
          required 
          class="form-control"
          placeholder="Unesite vaš JMBG (13 cifara)">
      </div>

      <div class="form-group">
        <label for="email">Email adresa</label>
        <input 
          type="email" 
          id="email" 
          [(ngModel)]="email" 
          name="email" 
          required 
          class="form-control"
          placeholder="Unesite vašu email adresu">
      </div>

      <div class="form-group">
        <label for="name">Ime i prezime</label>
        <input 
          type="text" 
          id="name" 
          [(ngModel)]="name" 
          name="name" 
          required 
          class="form-control"
          placeholder="Unesite vaše ime i prezime">
      </div>

      <div class="form-group">
        <label for="password">Lozinka</label>
        <input 
          type="password" 
          id="password" 
          [(ngModel)]="password" 
          name="password" 
          required 
          class="form-control"
          placeholder="Unesite sigurnu lozinku">
      </div>

      <button type="submit" class="btn-primary" [disabled]="!registerForm.form.valid">
        Registruj se
      </button>
    </form>

    <div class="auth-footer">
      <p>Već imate nalog?</p>
      <a routerLink="/login">Prijavite se ovde</a>
    </div>
  </div>
</div>
