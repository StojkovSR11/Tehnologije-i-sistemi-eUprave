<div class="deca-container">
  <h2>Lista dece</h2>

  <table class="dete-table">
    <thead>
      <tr>
        <th>Ime</th>
        <th>Prezime</th>
        <th>JMBG</th>
        <th>Korisnik ID</th>
        <th>Akcije</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let d of deca">
        <td>{{ d.ime }}</td>
        <td>{{ d.prezime }}</td>
        <td>{{ d.jmbg }}</td>
        <td>{{ d.korisnikId }}</td>
        <td class="card-actions">
          <button class="btn btn-primary" (click)="urediDete(d)">Uredi</button>
          <button class="btn btn-danger" (click)="obrisiDete(d)">Obriši</button>
        </td>
      </tr>
    </tbody>
  </table>

  <div class="card-actions">
    <button class="btn btn-secondary" routerLink="/predskolske/admin">⬅️ Nazad na admin</button>
    <button class="btn btn-success" routerLink="/predskolske/dodaj-dete">➕ Dodaj dete</button>
  </div>

  <div *ngIf="statusMessage" [ngClass]="statusClass" class="alert">
    {{ statusMessage }}
  </div>
</div>
