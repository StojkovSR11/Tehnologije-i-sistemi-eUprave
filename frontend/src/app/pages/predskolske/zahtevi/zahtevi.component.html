<div class="zahtevi-container">
  <h2>Upravljanje zahtevima za upis</h2>

  <div class="card">
    <div class="form-group">
      <label for="status-filter">Filter statusa</label>
      <select
        id="status-filter"
        class="form-control"
        [(ngModel)]="filterStatus"
        (change)="primeniFilter()"
      >
        <option value="SVI">Svi</option>
        <option value="NA_CEKANJU">Na čekanju</option>
        <option value="ODOBREN">Odobreni</option>
        <option value="ODBIJEN">Odbijeni</option>
      </select>
    </div>
    <button class="btn btn-secondary" (click)="loadZahtevi()">Osveži</button>
    <a class="btn btn-secondary" routerLink="/predskolske/admin">Nazad na admin</a>
  </div>

  <div *ngIf="statusMessage" [ngClass]="statusMessage.type" class="alert mt-10">
    {{ statusMessage.message }}
  </div>

  <div class="card mt-20">
    <h3>Lista zahteva</h3>
    <div *ngIf="isLoading">Učitavanje zahteva...</div>
    <div *ngIf="!isLoading && filtriraniZahtevi.length === 0">Nema zahteva za izabrani filter.</div>

    <ul>
      <li *ngFor="let z of filtriraniZahtevi">
        Dete: {{ getDeteIme(z.deteId) }} | Vrtić: {{ getVrticNaziv(z.vrticId) }} | Status: {{ z.status }}
        <span *ngIf="z.status === 'ODBIJEN' && z.napomena"> | Napomena: {{ z.napomena }}</span>

        <button *ngIf="z.status === 'NA_CEKANJU'" class="btn btn-success btn-sm" (click)="odobriZahtev(z.id!)">
          Odobri
        </button>
        <button *ngIf="z.status === 'NA_CEKANJU'" class="btn btn-danger btn-sm" (click)="odbijZahtevPrompt(z.id!)">
          Odbij
        </button>

        <button *ngIf="z.status !== 'NA_CEKANJU'" class="btn btn-secondary btn-sm" disabled>
          Obrađeno
        </button>
      </li>
    </ul>
  </div>
</div>
